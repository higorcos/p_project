<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <!-- Fundo terroso -->
  <rect width="1200" height="600" fill="#3E2723"/>

  <!-- Camadas de fundo gradiente -->
  <rect width="1200" height="600" fill="url(#bg-grad)"/>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#4E342E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1A237E;stop-opacity:0.4"/>
    </linearGradient>
  </defs>

  <!-- Faixa horizontal urucum no topo -->
  <rect x="0" y="0" width="1200" height="8" fill="#C0392B"/>

  <!-- Padrão geométrico — listras verticais esquerda -->
  <g opacity="0.15">
    <rect x="0" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="12" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="24" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="36" y="0" width="2" height="600" fill="#C0392B"/>
    <rect x="44" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="56" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="68" y="0" width="4" height="600" fill="#F5E6C8"/>
  </g>

  <!-- Padrão geométrico — listras verticais direita -->
  <g opacity="0.15">
    <rect x="1128" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="1140" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="1152" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="1160" y="0" width="2" height="600" fill="#C0392B"/>
    <rect x="1168" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="1180" y="0" width="4" height="600" fill="#F5E6C8"/>
    <rect x="1192" y="0" width="4" height="600" fill="#F5E6C8"/>
  </g>

  <!-- Grafismo geométrico central (losangos) -->
  <g transform="translate(600,300)" opacity="0.08">
    <polygon points="0,-120 120,0 0,120 -120,0" fill="none" stroke="#F5E6C8" stroke-width="2"/>
    <polygon points="0,-80 80,0 0,80 -80,0" fill="none" stroke="#D4A843" stroke-width="2"/>
    <polygon points="0,-40 40,0 0,40 -40,0" fill="none" stroke="#C0392B" stroke-width="2"/>
    <circle cx="0" cy="0" r="8" fill="#C0392B" opacity="0.5"/>
  </g>

  <!-- Faixa horizontal central com grafismo -->
  <g transform="translate(0, 260)">
    <rect x="80" y="0" width="1040" height="1" fill="#D4A843" opacity="0.3"/>
    <!-- Padrão de triângulos na faixa -->
    <g fill="#D4A843" opacity="0.25">
      <polygon points="100,10 110,0 120,10"/>
      <polygon points="120,0 130,10 140,0"/>
      <polygon points="140,10 150,0 160,10"/>
      <polygon points="160,0 170,10 180,0"/>
      <polygon points="180,10 190,0 200,10"/>
      <polygon points="1000,10 1010,0 1020,10"/>
      <polygon points="1020,0 1030,10 1040,0"/>
      <polygon points="1040,10 1050,0 1060,10"/>
      <polygon points="1060,0 1070,10 1080,0"/>
      <polygon points="1080,10 1090,0 1100,10"/>
    </g>
    <rect x="80" y="10" width="1040" height="1" fill="#D4A843" opacity="0.3"/>
  </g>

  <!-- Ícone câmera/imagem no centro (placeholder visual) -->
  <g transform="translate(570, 240)" opacity="0.2">
    <rect x="0" y="0" width="60" height="48" rx="6" fill="none" stroke="#F5E6C8" stroke-width="2"/>
    <circle cx="30" cy="24" r="12" fill="none" stroke="#F5E6C8" stroke-width="2"/>
    <circle cx="30" cy="24" r="5" fill="#F5E6C8"/>
    <rect x="10" y="4" width="12" height="6" rx="2" fill="#F5E6C8"/>
  </g>

  <!-- Texto principal -->
  <text x="600" y="320" font-family="Georgia, serif" font-size="36" font-weight="bold"
        fill="#F5E6C8" text-anchor="middle" letter-spacing="4">PROJETO CULTURAL INDÍGENA</text>

  <!-- Subtítulo -->
  <text x="600" y="360" font-family="Georgia, serif" font-size="16"
        fill="#D4A843" text-anchor="middle" letter-spacing="2">História · Cultura · Cotidiano</text>

  <!-- Linha decorativa urucum -->
  <rect x="480" y="378" width="240" height="2" fill="#C0392B"/>

  <!-- Faixa horizontal urucum na base -->
  <rect x="0" y="592" width="1200" height="8" fill="#C0392B"/>

  <!-- Faixa genipapo acima da base -->
  <rect x="0" y="585" width="1200" height="4" fill="#1A237E" opacity="0.6"/>
</svg>
