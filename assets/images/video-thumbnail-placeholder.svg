<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="vid-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1"/>
    </linearGradient>
    <pattern id="lines-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="20" x2="20" y2="0" stroke="#F5E6C8" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Fundo genipapo -->
  <rect width="640" height="360" fill="url(#vid-grad)"/>

  <!-- Padrão de linhas diagonais discreto -->
  <rect width="640" height="360" fill="url(#lines-pattern)"/>

  <!-- Faixa urucum topo -->
  <rect x="0" y="0" width="640" height="5" fill="#C0392B"/>

  <!-- Círculo play button -->
  <circle cx="320" cy="170" r="52" fill="#3E2723" opacity="0.7"/>
  <circle cx="320" cy="170" r="52" fill="none" stroke="#C0392B" stroke-width="3"/>
  <!-- Triângulo play -->
  <polygon points="308,148 308,192 348,170" fill="#F5E6C8"/>

  <!-- Grafismo horizontal acima do play -->
  <g transform="translate(0, 80)" opacity="0.2">
    <rect x="200" y="0" width="240" height="1" fill="#D4A843"/>
    <polygon points="214,6 220,0 226,6" fill="#D4A843"/>
    <polygon points="230,0 236,6 242,0" fill="#D4A843"/>
    <polygon points="246,6 252,0 258,6" fill="#D4A843"/>
    <polygon points="382,6 388,0 394,6" fill="#D4A843"/>
    <polygon points="398,0 404,6 410,0" fill="#D4A843"/>
    <polygon points="414,6 420,0 426,6" fill="#D4A843"/>
  </g>

  <!-- Barra inferior com info -->
  <rect x="0" y="300" width="640" height="60" fill="#3E2723" opacity="0.85"/>

  <!-- Label VÍDEO -->
  <rect x="24" y="312" width="60" height="20" rx="3" fill="#C0392B"/>
  <text x="54" y="326" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#F5E6C8" text-anchor="middle" letter-spacing="2">VÍDEO</text>

  <!-- Título placeholder -->
  <rect x="94" y="312" width="380" height="14" rx="3" fill="#F5E6C8" opacity="0.85"/>

  <!-- Duração placeholder -->
  <rect x="590" y="312" width="30" height="14" rx="3" fill="#D4A843" opacity="0.6"/>

  <!-- Desc placeholder -->
  <rect x="94" y="334" width="250" height="10" rx="3" fill="#F5E6C8" opacity="0.35"/>

  <!-- Faixa base -->
  <rect x="0" y="355" width="640" height="5" fill="#C0392B"/>
</svg>
