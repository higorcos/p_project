<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="gal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4226;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4E342E;stop-opacity:1"/>
    </linearGradient>
    <!-- Padrão geométrico indígena losango -->
    <pattern id="diamond-pattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <polygon points="15,2 28,15 15,28 2,15" fill="none" stroke="#D4A843" stroke-width="0.6" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Fundo -->
  <rect width="600" height="600" fill="url(#gal-grad)"/>
  <rect width="600" height="600" fill="url(#diamond-pattern)"/>

  <!-- Faixa urucum topo -->
  <rect x="0" y="0" width="600" height="6" fill="#C0392B"/>
  <!-- Faixa genipapo -->
  <rect x="0" y="6" width="600" height="3" fill="#1A237E" opacity="0.8"/>

  <!-- Grid masonry simulado -->
  <!-- Coluna 1 -->
  <rect x="30" y="36" width="170" height="220" rx="4" fill="#3E2723" opacity="0.7"/>
  <rect x="30" y="266" width="170" height="130" rx="4" fill="#3E2723" opacity="0.7"/>
  <rect x="30" y="406" width="170" height="164" rx="4" fill="#3E2723" opacity="0.7"/>

  <!-- Coluna 2 -->
  <rect x="215" y="36" width="170" height="130" rx="4" fill="#3E2723" opacity="0.7"/>
  <rect x="215" y="176" width="170" height="220" rx="4" fill="#3E2723" opacity="0.7"/>
  <rect x="215" y="406" width="170" height="164" rx="4" fill="#3E2723" opacity="0.7"/>

  <!-- Coluna 3 -->
  <rect x="400" y="36" width="170" height="164" rx="4" fill="#3E2723" opacity="0.7"/>
  <rect x="400" y="210" width="170" height="220" rx="4" fill="#3E2723" opacity="0.7"/>
  <rect x="400" y="440" width="170" height="130" rx="4" fill="#3E2723" opacity="0.7"/>

  <!-- Ícones imagem em cada card -->
  <g opacity="0.3" fill="none" stroke="#F5E6C8" stroke-width="1.5">
    <!-- Col 1 -->
    <rect x="90" y="120" width="50" height="40" rx="4"/>
    <circle cx="115" cy="140" r="10"/>
    <rect x="90" y="305" width="50" height="40" rx="4"/>
    <circle cx="115" cy="325" r="10"/>
    <rect x="90" y="465" width="50" height="40" rx="4"/>
    <circle cx="115" cy="485" r="10"/>
    <!-- Col 2 -->
    <rect x="275" y="75" width="50" height="40" rx="4"/>
    <circle cx="300" cy="95" r="10"/>
    <rect x="275" y="265" width="50" height="40" rx="4"/>
    <circle cx="300" cy="285" r="10"/>
    <rect x="275" y="465" width="50" height="40" rx="4"/>
    <circle cx="300" cy="485" r="10"/>
    <!-- Col 3 -->
    <rect x="460" y="100" width="50" height="40" rx="4"/>
    <circle cx="485" cy="120" r="10"/>
    <rect x="460" y="300" width="50" height="40" rx="4"/>
    <circle cx="485" cy="320" r="10"/>
    <rect x="460" y="480" width="50" height="40" rx="4"/>
    <circle cx="485" cy="500" r="10"/>
  </g>

  <!-- Rótulo GALERIA centralizado -->
  <rect x="220" y="270" width="160" height="32" rx="6" fill="#C0392B" opacity="0.9"/>
  <text x="300" y="292" font-family="Georgia, serif" font-size="14" font-weight="bold"
        fill="#F5E6C8" text-anchor="middle" letter-spacing="3">GALERIA</text>

  <!-- Faixa base -->
  <rect x="0" y="591" width="600" height="3" fill="#1A237E" opacity="0.8"/>
  <rect x="0" y="594" width="600" height="6" fill="#C0392B"/>
</svg>
