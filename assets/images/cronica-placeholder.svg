<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4E342E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1"/>
    </linearGradient>
    <!-- Padrão geométrico indígena -->
    <pattern id="geo-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="transparent"/>
      <polygon points="20,2 38,38 2,38" fill="none" stroke="#D4A843" stroke-width="0.8" opacity="0.4"/>
      <polygon points="20,10 30,30 10,30" fill="#C0392B" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Fundo -->
  <rect width="800" height="500" fill="url(#card-grad)"/>

  <!-- Padrão geométrico de fundo -->
  <rect width="800" height="500" fill="url(#geo-pattern)" opacity="0.5"/>

  <!-- Faixa urucum no topo -->
  <rect x="0" y="0" width="800" height="6" fill="#C0392B"/>

  <!-- Faixa genipapo -->
  <rect x="0" y="6" width="800" height="3" fill="#1A237E" opacity="0.7"/>

  <!-- Bloco de texto placeholder no canto inferior esquerdo -->
  <rect x="0" y="360" width="800" height="140" fill="url(#bottom-grad)"/>
  <defs>
    <linearGradient id="bottom-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3E2723;stop-opacity:0"/>
      <stop offset="60%" style="stop-color:#3E2723;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Ícone imagem placeholder -->
  <g transform="translate(360, 180)" opacity="0.25">
    <rect x="0" y="0" width="80" height="64" rx="8" fill="none" stroke="#F5E6C8" stroke-width="2"/>
    <circle cx="40" cy="32" r="16" fill="none" stroke="#F5E6C8" stroke-width="2"/>
    <circle cx="40" cy="32" r="7" fill="#F5E6C8"/>
    <circle cx="60" cy="12" r="5" fill="#F5E6C8"/>
  </g>

  <!-- Rótulo CRÔNICA -->
  <rect x="40" y="380" width="80" height="22" rx="3" fill="#C0392B"/>
  <text x="80" y="396" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#F5E6C8" text-anchor="middle" letter-spacing="2">CRÔNICA</text>

  <!-- Título placeholder -->
  <rect x="40" y="412" width="540" height="18" rx="3" fill="#F5E6C8" opacity="0.9"/>

  <!-- Data placeholder -->
  <rect x="40" y="440" width="140" height="12" rx="3" fill="#D4A843" opacity="0.6"/>

  <!-- Faixa decorativa lateral esquerda -->
  <rect x="0" y="0" width="6" height="500" fill="#C0392B" opacity="0.4"/>

  <!-- Faixa base urucum -->
  <rect x="0" y="494" width="800" height="6" fill="#C0392B"/>
</svg>
